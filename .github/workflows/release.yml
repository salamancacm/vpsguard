name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./... -race

      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch go build \
              -trimpath \
              -ldflags "-s -w -X github.com/salamancacm/vpsguard/cmd.Version=${GITHUB_REF_NAME}" \
              -o "dist/vpsguard-linux-$arch" .
          done

      - name: Checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
